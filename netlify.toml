[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — all routes serve the app shell
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Service worker must be served fresh, not cached at the edge
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# PDF.js worker is large; let it cache aggressively (Vite hashes the filename)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
