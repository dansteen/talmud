<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1208" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/src/style.css" />
  <title>תלמוד</title>
</head>
<body>
  <div id="app">

    <!-- Page viewer -->
    <div id="viewer">
      <canvas id="page-canvas"></canvas>
      <div id="region-overlay"></div>
    </div>

    <!-- Loading spinner -->
    <div id="loading" class="hidden">
      <div class="spinner"></div>
    </div>

    <!-- Region detection pending indicator -->
    <div id="region-pending" class="hidden">⋯</div>

    <!-- Welcome / guide screen (shown when no masechta is open) -->
    <div id="welcome" class="hidden">
      <div class="welcome-inner">
        <h1 class="welcome-title" data-i18n="app.title"></h1>
        <ul class="welcome-guide">
          <li data-i18n="welcome.guide.doubleTap"></li>
          <li data-i18n="welcome.guide.pinch"></li>
          <li data-i18n="welcome.guide.swipe"></li>
          <li data-i18n="welcome.guide.pull"></li>
        </ul>
        <button id="welcome-open-btn" data-i18n="welcome.openBtn"></button>
        <div id="welcome-lang" class="lang-dropdown"></div>
      </div>
    </div>

    <!-- Drawer peek (always visible at bottom) -->
    <div id="peek">
      <div id="peek-handle"></div>
    </div>

    <!-- Drawer scrim + drawer (slides up from bottom) -->
    <div id="drawer-scrim" class="hidden"></div>
    <div id="drawer" class="hidden">
      <div id="drawer-grip">
        <div id="drawer-grip-bar"></div>
      </div>

      <!-- Sliders sub-view -->
      <div id="sliders-view" class="drawer-view">
        <div id="slider-stack"></div>
        <button id="add-masechta-btn" data-i18n="drawer.addMasechta"></button>
        <div id="drawer-footer">
          <div id="drawer-lang" class="lang-dropdown"></div>
          <button id="settings-btn" data-i18n-aria="a11y.settings">⚙</button>
        </div>
      </div>

      <!-- Picker sub-view -->
      <div id="picker-view" class="drawer-view hidden">
        <div id="picker-header">
          <button id="picker-back-btn" data-i18n-aria="a11y.back">›</button>
          <span id="picker-title" data-i18n="picker.title"></span>
        </div>
        <div id="picker-list"></div>
      </div>

      <!-- Settings sub-view -->
      <div id="settings-view" class="drawer-view hidden">
        <div id="settings-header">
          <button id="settings-back-btn" data-i18n-aria="a11y.back">›</button>
          <span id="settings-title" data-i18n="settings.title"></span>
        </div>
        <div id="settings-list">
          <label class="settings-row">
            <span class="settings-row-label" data-i18n="settings.debug"></span>
            <input type="checkbox" id="settings-debug-toggle" class="settings-toggle">
          </label>
        </div>
      </div>
    </div>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
