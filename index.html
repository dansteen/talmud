<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1208" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/src/style.css" />
  <title>תלמוד</title>
</head>
<body>
  <div id="app">

    <!-- Page viewer -->
    <div id="viewer">
      <canvas id="page-canvas"></canvas>
      <div id="region-overlay"></div>
    </div>

    <!-- Loading spinner -->
    <div id="loading" class="hidden">
      <div class="spinner"></div>
    </div>

    <!-- Region detection pending indicator -->
    <div id="region-pending" class="hidden">⋯</div>

    <!-- Welcome / guide screen (shown when no masechta is open) -->
    <div id="welcome" class="hidden">
      <div class="welcome-inner">
        <h1 class="welcome-title">תלמוד</h1>
        <ul class="welcome-guide">
          <li><span class="welcome-key">הקש פעמיים</span> לזום לטור</li>
          <li><span class="welcome-key">צביטה</span> להגדלה חופשית</li>
          <li><span class="welcome-key">החלקה בשלוש אצבעות</span> לדף הבא או הקודם</li>
          <li><span class="welcome-key">משוך מלמטה</span> לבחירת מסכת</li>
        </ul>
        <button id="welcome-open-btn">פתח</button>
      </div>
    </div>

    <!-- Drawer peek (always visible at bottom) -->
    <div id="peek">
      <div id="peek-handle"></div>
    </div>

    <!-- Drawer scrim + drawer (slides up from bottom) -->
    <div id="drawer-scrim" class="hidden"></div>
    <div id="drawer" class="hidden">
      <div id="drawer-grip">
        <div id="drawer-grip-bar"></div>
      </div>

      <!-- Sliders sub-view -->
      <div id="sliders-view" class="drawer-view">
        <div id="slider-stack"></div>
        <button id="add-masechta-btn">+ הוסף מסכת</button>
      </div>

      <!-- Picker sub-view -->
      <div id="picker-view" class="drawer-view hidden">
        <div id="picker-header">
          <button id="picker-back-btn" aria-label="Back">›</button>
          <span id="picker-title">בחר מסכת</span>
        </div>
        <div id="picker-list"></div>
      </div>
    </div>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
